# Patroni 模式部署示例
# 目标：单节点约 1GB 可用内存，使用 soft/ 下现成的 python3 / patroni / etcd 软件创建集群
#
# 使用建议：
# 1. 把运行时软件放到仓库 soft/ 目录
# 2. 推荐目录模式：
#    soft/patroni-runtime/bin/python3
#    soft/patroni-runtime/bin/patroni
#    soft/patroni-runtime/bin/patronictl
#    soft/etcd-runtime/bin/etcd
#    soft/etcd-runtime/bin/etcdctl
# 3. 也支持平铺模式：
#    soft/python3 soft/patroni soft/patronictl soft/etcd soft/etcdctl soft/site-packages

ssh_user: root
# ssh_password: your_password

deploy_mode: patroni
build_mode: distribute

# PostgreSQL 二进制包或已解压目录
pg_source: /path/to/postgresql-17-bin.tar.gz
pg_soft_dir: /usr/local/pgsql

# 可选：如果不填，程序会自动优先探测 soft/patroni-runtime、soft/etcd-runtime，
# 或 soft/ 下的平铺 python3/patroni/patronictl/etcd/etcdctl
# patroni_package: soft/patroni-runtime
# patroni_wheelhouse: soft/patroni-wheelhouse-debian-amd64.tar.gz
# etcd_package: soft/etcd-runtime

pg_user: postgres
replication_user: replicator

timeout_pg_ready: 120
timeout_patroni_ready: 120
timeout_basebackup: 600
timeout_scp: 1200

# 组配置
# 格式: id|name|role|host:port:data_dir:wal_dir:pglog_dir:is_master,...
#
# 1G 内存建议：
# - DataDir 使用独立数据盘
# - WALDir 使用更快磁盘时单独挂载
# - PGLogDir 独立日志目录，便于 rotate/清理
#
# 三节点 Patroni 示例
group_0: 0|pg01|primary|192.168.10.11:5432:/data/pgsql/17/data:/data/pgsql/17/wal:/data/pgsql/17/log:1,1|pg02|standby|192.168.10.12:5432:/data/pgsql/17/data:/data/pgsql/17/wal:/data/pgsql/17/log:0,2|pg03|standby|192.168.10.13:5432:/data/pgsql/17/data:/data/pgsql/17/wal:/data/pgsql/17/log:0
