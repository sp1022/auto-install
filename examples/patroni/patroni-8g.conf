# Patroni / PostgreSQL 参数示例
# 目标：单节点约 1GB 可用内存
# 风格：参数相对完整，偏 OLTP 通用场景，SSD/云盘优先
#
# 说明：
# - 这是“参数模板”，适合作为后续 Patroni YAML 生成的参考基线
# - 当前主部署流程不会自动完整读取这里的每个字段，但这些值可直接用于 Patroni YAML / postgresql.conf 定制

# etcd 配置
etcd_hosts: "192.168.10.11:2379,192.168.10.12:2379,192.168.10.13:2379"
etcd_protocol: "http"
etcd_cacert: ""
etcd_cert: ""
etcd_key: ""

# REST API 配置
restapi_port: 8008
restapi_listen: "0.0.0.0:8008"

# PostgreSQL 参数
pg_parameters:
  max_connections: "100"
  superuser_reserved_connections: "5"

  shared_buffers: "256MB"
  effective_cache_size: "768MB"
  work_mem: "2MB"
  maintenance_work_mem: "64MB"
  autovacuum_work_mem: "32MB"

  wal_level: "replica"
  wal_log_hints: "on"
  wal_buffers: "8MB"
  min_wal_size: "256MB"
  max_wal_size: "1GB"
  checkpoint_completion_target: "0.9"

  max_worker_processes: "4"
  max_parallel_workers: "2"
  max_parallel_workers_per_gather: "1"
  max_parallel_maintenance_workers: "1"

  max_wal_senders: "8"
  max_replication_slots: "8"
  hot_standby: "on"
  hot_standby_feedback: "on"
  wal_keep_size: "512MB"
  max_slot_wal_keep_size: "2GB"

  random_page_cost: "1.1"
  effective_io_concurrency: "100"
  default_statistics_target: "100"

  shared_preload_libraries: "pg_stat_statements"
  track_io_timing: "on"
  track_functions: "pl"
  pg_stat_statements.max: "5000"
  pg_stat_statements.track: "all"

  logging_collector: "on"
  log_destination: "stderr"
  log_checkpoints: "on"
  log_connections: "off"
  log_disconnections: "off"
  log_lock_waits: "on"
  log_temp_files: "10MB"
  log_autovacuum_min_duration: "3s"
  log_min_duration_statement: "1000"
  log_line_prefix: "%m [%p] %q%u@%d "

  autovacuum: "on"
  autovacuum_max_workers: "3"
  autovacuum_naptime: "30s"
  autovacuum_vacuum_scale_factor: "0.1"
  autovacuum_analyze_scale_factor: "0.02"

# Citus 配置（未启用时保持 false）
enable_citus: false
citus_group: 0
citus_database: "postgres"

# 复制配置
replication_user: "replicator"
replication_password: ""

# Bootstrap 配置
bootstrap_encoding: "UTF8"
bootstrap_locale: "en_US.UTF-8"
bootstrap_data_checksums: "on"

# DCS 配置
dcs_ttl: 30
dcs_loop_wait: 10
dcs_retry_timeout: 10
dcs_maximum_lag_on_failover: 1048576
dcs_master_start_timeout: 300
dcs_primary_start_timeout: 300
dcs_replica_start_timeout: 300
dcs_synchronous_mode: true
dcs_synchronous_node_count: 1

# 日志配置
log_directory: "/data/pgsql/17/log"
log_filename: "postgresql-%Y-%m-%d.log"
log_checkpoints: "on"

# PG_HBA 规则
pg_hba:
  - "local all all peer"
  - "host all all 127.0.0.1/32 scram-sha-256"
  - "host all all ::1/128 scram-sha-256"
  - "host all all 192.168.10.0/24 scram-sha-256"
  - "host replication replicator 192.168.10.0/24 scram-sha-256"
